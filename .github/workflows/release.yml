name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: "1.25.6"
      - run: go version
      - run: make publish
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "ap-southeast-1"
      # - name: Create Release
      #   id: create_release
      #   uses: actions/create-release@v1
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #   with:
      #     tag_name: ${{ github.ref }}
      #     release_name: GroceryBot Release ${{ github.ref }}
      #     draft: false
      #     prerelease: false

  deploy:
    needs: release
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Notify release webhook
        run: |
          curl -fsS -X POST -H 'Content-Type: application/json' \
            -H "Authorization: Bearer ${{ secrets.OPS_WEBHOOK_AUTH_TOKEN }}" \
            -d '{"tag":"'"${{ github.ref_name }}"'","repository":"'"${{ github.repository }}"'","run_url":"'"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"'"}' \
            "${{ secrets.OPS_WEBHOOK_DEPLOY }}"
